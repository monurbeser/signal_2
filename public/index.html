<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoSignal Futures Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#090c10; --bg2:#0d1117; --bg3:#161b22; --border:#21262d;
  --text:#e6edf3; --muted:#8b949e;
  --green:#3fb950; --green-dim:#1a3a22;
  --red:#f85149;   --red-dim:#3a1a1a;
  --yellow:#d29922;--yellow-dim:#3a2e10;
  --blue:#58a6ff;  --accent:#79c0ff;
  --mono:'JetBrains Mono',monospace;
  --display:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999;}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--display);font-size:16px;font-weight:800;letter-spacing:-.5px;}
.logo span{color:var(--green);}
.logo sub{font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:400;margin-left:4px;letter-spacing:.05em;}
.hright{display:flex;align-items:center;gap:12px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.htext{color:var(--muted);font-size:10px;}
.btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:.15s;}
.btn:hover{border-color:var(--blue);color:var(--blue);}

/* STATS BAR */
.stats-bar{display:flex;gap:20px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;}
.stat-item{display:flex;align-items:center;gap:6px;font-size:10px;}
.stat-label{color:var(--muted);}
.stat-val{font-weight:500;}
.stat-val.long{color:var(--green);}
.stat-val.short{color:var(--red);}
.stat-val.hold{color:var(--yellow);}

/* MAIN */
main{padding:16px 20px;max-width:1600px;margin:0 auto;}

/* COIN GRID */
.coins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px;}

.coin-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default;}
.coin-card:hover{border-color:#30363d;transform:translateY(-1px);}
.coin-card.long {border-top:2px solid var(--green);}
.coin-card.short{border-top:2px solid var(--red);}
.coin-card.hold {border-top:2px solid var(--border);}

.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.cn{font-family:var(--display);font-size:13px;font-weight:700;}
.ctf{font-size:9px;color:var(--muted);margin-top:1px;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.04em;}
.badge.long {background:var(--green-dim);color:var(--green);}
.badge.short{background:var(--red-dim);color:var(--red);}
.badge.hold {background:var(--bg3);color:var(--muted);}

.cprice{font-size:18px;font-weight:500;margin-bottom:2px;}
.cchange{font-size:10px;margin-bottom:10px;}
.cchange.up{color:var(--green);}
.cchange.dn{color:var(--red);}
.cchange.fl{color:var(--muted);}

.conf-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.conf-row span{font-size:9px;color:var(--muted);}
.conf-row strong{font-size:9px;}
.cbar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.cfill{height:100%;border-radius:2px;transition:width .5s;}
.cfill.long{background:var(--green);}
.cfill.short{background:var(--red);}
.cfill.hold{background:var(--border);}

/* TP/SL/LEV row */
.futures-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;}
.fi{background:var(--bg3);border-radius:4px;padding:5px 6px;}
.fi-name{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.fi-val{font-size:11px;font-weight:500;}
.fi-val.lev{color:var(--accent);}
.fi-val.tp{color:var(--green);}
.fi-val.sl{color:var(--red);}

/* Indicators */
.inds{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.ind{background:var(--bg3);border-radius:4px;padding:5px 6px;}
.iname{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.ival{font-size:11px;font-weight:500;}
.ival.bull{color:var(--green);}
.ival.bear{color:var(--red);}
.ival.neut{color:var(--muted);}

/* BOTTOM */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:800px){.bottom-grid{grid-template-columns:1fr;}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);font-family:var(--display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.ph span{font-family:var(--mono);font-size:9px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;}
.chart-wrap{padding:14px;height:220px;position:relative;}
.sw{max-height:300px;overflow-y:auto;}
.sw::-webkit-scrollbar{width:3px;}
.sw::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
table{width:100%;border-collapse:collapse;}
th{font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:7px 12px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);}
td{padding:7px 12px;border-bottom:1px solid var(--border);font-size:11px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.tlong{color:var(--green);font-weight:700;}
.tshort{color:var(--red);font-weight:700;}
.tm{color:var(--muted);}
.erow{text-align:center;color:var(--muted);padding:28px 12px !important;}
</style>
</head>
<body>

<header>
  <div class="logo">Crypto<span>Signal</span><sub>FUTURES</sub></div>
  <div class="hright">
    <div class="dot"></div>
    <span class="htext">LIVE</span>
    <span class="htext" id="last-update">—</span>
    <button class="btn" onclick="refreshAll()">↻ Yenile</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><span class="stat-label">Toplam</span><span class="stat-val" id="st-total">—</span></div>
  <div class="stat-item"><span class="stat-label">LONG</span><span class="stat-val long" id="st-long">—</span></div>
  <div class="stat-item"><span class="stat-label">SHORT</span><span class="stat-val short" id="st-short">—</span></div>
  <div class="stat-item"><span class="stat-label">HOLD</span><span class="stat-val hold" id="st-hold">—</span></div>
  <div class="stat-item"><span class="stat-label">F&G</span><span class="stat-val" id="st-fg">—</span></div>
  <div class="stat-item"><span class="stat-label">Güncellendi</span><span class="stat-val" id="st-time">—</span></div>
</div>

<main>
  <div class="coins-grid" id="coins-grid"></div>
  <div class="bottom-grid">
    <div class="panel">
      <div class="ph">Güven Skoru Geçmişi<span id="chart-sub">son sinyaller</span></div>
      <div class="chart-wrap"><canvas id="conf-chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="ph">Sinyal Geçmişi<span id="sig-count">— kayıt</span></div>
      <div class="sw">
        <table>
          <thead><tr>
            <th>Sembol</th><th>Yön</th><th>Güven</th><th>Kaldıraç</th><th>Fiyat</th><th>TP</th><th>SL</th><th>Zaman</th>
          </tr></thead>
          <tbody id="sig-tbody"><tr><td class="erow" colspan="8">Yükleniyor...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
const SYMBOLS = [
  'BTC/USDT','ETH/USDT','BNB/USDT','SOL/USDT','XRP/USDT',
  'DOGE/USDT','ADA/USDT','AVAX/USDT','LINK/USDT','TRX/USDT',
  'LTC/USDT','BCH/USDT','DOT/USDT','NEAR/USDT','ATOM/USDT',
  'FIL/USDT','ETC/USDT','APT/USDT','ARB/USDT','OP/USDT',
  'SUI/USDT','SEI/USDT','TIA/USDT','INJ/USDT','RUNE/USDT',
  'WLD/USDT','FET/USDT','RENDER/USDT','TAO/USDT','JUP/USDT',
  '1000PEPE/USDT','WIF/USDT','1000BONK/USDT','1000FLOKI/USDT','1000SHIB/USDT',
  'DOGS/USDT','PNUT/USDT','POPCAT/USDT','MEME/USDT','TURBO/USDT',
  'UNI/USDT','AAVE/USDT','CRV/USDT','DYDX/USDT','GMX/USDT',
  'GALA/USDT','SAND/USDT','MANA/USDT','ENA/USDT','PENDLE/USDT',
];

let confChart = null;
const cardData = {};

function fmtPrice(p) {
  if (!p) return '—';
  const n = parseFloat(p);
  if (n < 0.0001) return '$' + n.toFixed(8);
  if (n < 0.01)   return '$' + n.toFixed(6);
  if (n < 1)      return '$' + n.toFixed(4);
  if (n < 100)    return '$' + n.toFixed(3);
  return '$' + n.toLocaleString('en-US', {maximumFractionDigits:2});
}

function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('tr-TR', {
    timeZone:'Asia/Dubai', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
}

function indClass(val, low, high) {
  if (val == null) return 'neut';
  return val < low ? 'bull' : val > high ? 'bear' : 'neut';
}

function buildCard(symbol) {
  const div = document.createElement('div');
  div.className = 'coin-card hold';
  div.id = 'card-' + symbol.replace('/', '-');
  div.innerHTML = `
    <div class="ch">
      <div><div class="cn">${symbol.replace('/USDT','')}</div><div class="ctf">USDT PERP • 5M</div></div>
      <span class="badge hold">—</span>
    </div>
    <div class="cprice">$—</div>
    <div class="cchange fl">Yükleniyor...</div>
    <div class="conf-row"><span>Güven</span><strong>—</strong></div>
    <div class="cbar"><div class="cfill hold" style="width:20%"></div></div>
    <div class="futures-row">
      <div class="fi"><div class="fi-name">Kaldıraç</div><div class="fi-val lev">—</div></div>
      <div class="fi"><div class="fi-name">TP</div><div class="fi-val tp">—</div></div>
      <div class="fi"><div class="fi-name">SL</div><div class="fi-val sl">—</div></div>
    </div>
    <div class="inds">
      <div class="ind"><div class="iname">RSI</div><div class="ival neut">—</div></div>
      <div class="ind"><div class="iname">MACD</div><div class="ival neut">—</div></div>
      <div class="ind"><div class="iname">BB</div><div class="ival neut">—</div></div>
      <div class="ind"><div class="iname">StochK</div><div class="ival neut">—</div></div>
    </div>`;
  return div;
}

function initGrid() {
  const grid = document.getElementById('coins-grid');
  grid.innerHTML = '';
  SYMBOLS.forEach(s => grid.appendChild(buildCard(s)));
}

function updateCard(symbol, data) {
  const id = 'card-' + symbol.replace('/', '-');
  const card = document.getElementById(id);
  if (!card) return;
  cardData[symbol] = data;

  const dir = (data.direction || 'HOLD').toLowerCase();
  const conf = data.confidence || 50;
  const ind = data.indicators || {};
  const lev = data.leverage;
  const tpsl = data.tpsl;

  card.className = 'coin-card ' + dir;

  const ch = data.change24h;
  const chClass = ch > 0 ? 'up' : ch < 0 ? 'dn' : 'fl';
  const chStr = ch != null ? (ch >= 0 ? '+' : '') + parseFloat(ch).toFixed(2) + '% (24s)' : '—';

  const rsiC = indClass(ind.rsi, 32, 68);
  const macdC = ind.macd > 0 ? 'bull' : ind.macd < 0 ? 'bear' : 'neut';
  const bbC = indClass(ind.bbPos, 20, 80);
  const skC = ind.stoch ? indClass(ind.stoch.k, 20, 80) : 'neut';

  card.innerHTML = `
    <div class="ch">
      <div><div class="cn">${symbol.replace('/USDT','')}</div><div class="ctf">PERP • ${fmtTime(data.timestamp)}</div></div>
      <span class="badge ${dir}">${data.direction || 'HOLD'}</span>
    </div>
    <div class="cprice">${fmtPrice(data.price)}</div>
    <div class="cchange ${chClass}">${chStr}</div>
    <div class="conf-row"><span>Güven</span><strong>${conf}/100</strong></div>
    <div class="cbar"><div class="cfill ${dir}" style="width:${conf}%"></div></div>
    <div class="futures-row">
      <div class="fi"><div class="fi-name">Kaldıraç</div><div class="fi-val lev">${lev ? lev + 'x' : '—'}</div></div>
      <div class="fi"><div class="fi-name">TP</div><div class="fi-val tp">${tpsl ? fmtPrice(tpsl.tp) : '—'}</div></div>
      <div class="fi"><div class="fi-name">SL</div><div class="fi-val sl">${tpsl ? fmtPrice(tpsl.sl) : '—'}</div></div>
    </div>
    <div class="inds">
      <div class="ind"><div class="iname">RSI</div><div class="ival ${rsiC}">${ind.rsi != null ? ind.rsi.toFixed(1) : '—'}</div></div>
      <div class="ind"><div class="iname">MACD</div><div class="ival ${macdC}">${ind.macd != null ? (ind.macd >= 0 ? '+' : '') + ind.macd.toFixed(4) : '—'}</div></div>
      <div class="ind"><div class="iname">BB</div><div class="ival ${bbC}">${ind.bbPos != null ? ind.bbPos + '%' : '—'}</div></div>
      <div class="ind"><div class="iname">StochK</div><div class="ival ${skC}">${ind.stoch ? ind.stoch.k.toFixed(1) : '—'}</div></div>
    </div>`;
}

function updateStats(results) {
  const total = results.length;
  const longs = results.filter(r => r.direction === 'LONG').length;
  const shorts = results.filter(r => r.direction === 'SHORT').length;
  const holds = results.filter(r => r.direction === 'HOLD').length;
  const fg = results[0]?.indicators?.fearGreed;

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-long').textContent = longs;
  document.getElementById('st-short').textContent = shorts;
  document.getElementById('st-hold').textContent = holds;
  document.getElementById('st-fg').textContent = fg != null ? fg + ' (' + (fg < 25 ? 'Aşırı Korku' : fg > 75 ? 'Açgözlülük' : 'Nötr') + ')' : '—';
  document.getElementById('st-time').textContent = new Date().toLocaleTimeString('tr-TR', { timeZone: 'Asia/Dubai' });
}

async function loadCards() {
  const results = [];
  // 5'li batch — UI'yi bloklamadan yükle
  for (let i = 0; i < SYMBOLS.length; i += 5) {
    const batch = SYMBOLS.slice(i, i + 5);
    await Promise.allSettled(batch.map(async sym => {
      try {
        const res = await fetch('/api/analyze/' + encodeURIComponent(sym));
        const json = await res.json();
        if (json.ok) { updateCard(sym, json.data); results.push(json.data); }
      } catch {}
    }));
  }
  updateStats(results);
}

async function loadSignals() {
  try {
    const res = await fetch('/api/signals?limit=100');
    const json = await res.json();
    if (!json.ok) return;
    const rows = json.data;
    document.getElementById('sig-count').textContent = rows.length + ' kayıt';

    const tbody = document.getElementById('sig-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td class="erow" colspan="8">Henüz sinyal yok</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(r => {
      const dir = (r.direction || '').toLowerCase();
      return `<tr>
        <td style="font-weight:500">${r.symbol}</td>
        <td class="t${dir}">${r.direction}</td>
        <td class="tm">${r.confidence}/100</td>
        <td class="tm">${r.leverage ? r.leverage + 'x' : '—'}</td>
        <td style="color:var(--accent);font-size:10px">${fmtPrice(r.price)}</td>
        <td style="color:var(--green);font-size:10px">${r.tpsl ? fmtPrice(r.tpsl.tp) : '—'}</td>
        <td style="color:var(--red);font-size:10px">${r.tpsl ? fmtPrice(r.tpsl.sl) : '—'}</td>
        <td class="tm">${fmtTime(r.created_at)}</td>
      </tr>`;
    }).join('');

    renderChart(rows);
  } catch {}
}

function renderChart(rows) {
  const recent = rows.slice(0, 30).reverse();
  const labels = recent.map(r => r.symbol.replace('/USDT', '') + ' ' + (r.direction === 'LONG' ? '▲' : '▼'));
  const confs = recent.map(r => r.confidence);
  const colors = recent.map(r => r.direction === 'LONG' ? '#3fb950' : r.direction === 'SHORT' ? '#f85149' : '#d29922');

  if (confChart) confChart.destroy();
  const ctx = document.getElementById('conf-chart').getContext('2d');
  confChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data: confs, backgroundColor: colors, borderRadius: 3, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#161b22', borderColor: '#21262d', borderWidth: 1,
        titleColor: '#e6edf3', bodyColor: '#8b949e',
        callbacks: { label: ctx => `Güven: ${ctx.raw}/100` }
      }},
      scales: {
        x: { ticks: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 9 }, maxRotation: 45 }, grid: { color: '#21262d' } },
        y: { min: 0, max: 100, ticks: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 9 }, stepSize: 25 }, grid: { color: '#21262d' } }
      }
    }
  });
}

async function refreshAll() {
  document.getElementById('last-update').textContent = 'Güncelleniyor...';
  await Promise.all([loadCards(), loadSignals()]);
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('tr-TR', { timeZone: 'Asia/Dubai' });
}

initGrid();
refreshAll();
setInterval(refreshAll, 3 * 60 * 1000); // 3 dakikada bir auto-refresh
</script>
</body>
</html>
